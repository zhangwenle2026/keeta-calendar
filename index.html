<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Keeta Global Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A0A0A;--bg2:#111111;--bg3:#1A1A1A;--bg4:#141414;
  --text:rgba(255,255,255,0.9);--text2:rgba(255,255,255,0.5);--text3:rgba(255,255,255,0.25);
  --border:rgba(255,255,255,0.07);--orange:#FF6900;
  --font-serif:'Playfair Display',Georgia,serif;
  --font-baskerville:'Libre Baskerville',Georgia,serif;
  --font-sans:'Inter',-apple-system,sans-serif;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-sans);overflow-x:hidden;min-height:100vh}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:3px}

/* ===== HEADER ===== */
#site-header{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 40px;
  transition:background .4s,backdrop-filter .4s;
}
#site-header.transparent{background:transparent}
#site-header.solid{background:rgba(10,10,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
#header-left{display:flex;align-items:center;gap:8px}
#back-btn{
  display:none;align-items:center;gap:6px;
  background:none;border:none;color:white;cursor:pointer;
  font-family:var(--font-serif);font-weight:900;font-size:20px;letter-spacing:3px;
  padding:0;
}
#back-btn .back-arrow{font-size:16px;opacity:0.7}
#header-right{display:flex;align-items:center;gap:24px}
.lang-group{display:flex;align-items:center;gap:16px}
.lang-btn{
  font-size:12px;font-weight:500;background:none;border:none;cursor:pointer;
  padding:2px 0;color:rgba(255,255,255,0.38);border-bottom:2px solid transparent;
  transition:all .2s;letter-spacing:.5px;
}
.lang-btn.active{color:white;border-bottom:2px solid white;padding-bottom:1px}
.lang-btn:hover:not(.active){color:rgba(255,255,255,0.65)}
#year-select{
  background:none;border:1px solid rgba(255,255,255,0.2);color:white;
  font-size:12px;font-family:var(--font-sans);padding:4px 8px;border-radius:6px;
  cursor:pointer;outline:none;
}
#year-select option{background:#1a1a1a;color:white}

/* ===== HERO GLOBAL ===== */
#hero-global{
  position:relative;width:100%;height:100vh;overflow:hidden;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.hero-slide{
  position:absolute;inset:0;background-size:cover;background-position:center;
  opacity:0;transition:opacity 1.2s ease;
}
.hero-slide.active{opacity:1}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,0.35) 0%,rgba(0,0,0,0.2) 40%,rgba(0,0,0,0.65) 80%,rgba(0,0,0,0.9) 100%);
}
.hero-content{
  position:relative;z-index:2;text-align:center;
  display:flex;flex-direction:column;align-items:center;
  gap:16px;margin-top:0;
  padding-bottom:80px;
}
.hero-title{
  font-family:var(--font-serif);font-weight:900;
  font-size:clamp(60px,9vw,130px);color:white;
  line-height:1;letter-spacing:-1px;
}
.hero-subtitle{
  font-family:var(--font-baskerville);font-style:italic;
  font-size:13px;color:rgba(255,255,255,0.55);letter-spacing:1px;
}
.hero-cards{
  position:absolute;bottom:0;left:0;right:0;z-index:2;
  display:flex;flex-direction:row;gap:0;
  width:100%;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,0.08);
}
.country-card{
  flex:1;min-width:0;
  background:transparent;
  border:none;
  border-right:1px solid rgba(255,255,255,0.07);
  border-radius:0;
  padding:14px 8px 12px;cursor:pointer;text-align:center;
  transition:all .25s;overflow:hidden;position:relative;
}
.country-card:last-child{border-right:none}
.country-card::after{
  content:'';position:absolute;top:-50%;left:-75%;width:50%;height:200%;
  background:linear-gradient(to right,transparent,rgba(255,255,255,0.08),transparent);
  transform:skewX(-20deg);transition:left .5s;
}
.country-card:hover::after{left:125%}
.country-card:hover{
  background:rgba(255,255,255,0.07);
  transform:none;
}
.country-card.active{background:rgba(255,255,255,0.12);border-bottom:2px solid var(--orange);}
.cc-flag{font-size:20px;display:block;margin-bottom:3px}
.cc-name{font-size:10px;font-weight:600;color:white;letter-spacing:.4px;display:block}
.cc-time{font-size:13px;font-family:'Courier New',monospace;color:rgba(255,255,255,0.9);display:block;margin-top:3px;letter-spacing:.5px}
.cc-weather{font-size:10px;color:rgba(255,255,255,0.5);display:block;margin-top:2px}

/* ===== HERO COUNTRY ===== */
#hero-country{
  display:none;position:relative;width:100%;height:100vh;overflow:hidden;
  align-items:flex-end;justify-content:flex-start;
}
.hero-country-bg{
  position:absolute;inset:0;background-size:cover;background-position:center;
}
.hero-country-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85) 0%,rgba(0,0,0,0.3) 50%,rgba(0,0,0,0.15) 100%);
}
.hero-country-content{
  position:relative;z-index:2;padding:60px 80px;
}
.hero-country-title{
  font-family:var(--font-serif);font-weight:900;
  font-size:clamp(72px,10vw,150px);color:white;
  line-height:0.9;letter-spacing:-2px;
}
.hero-country-subtitle{
  font-family:var(--font-baskerville);font-style:italic;
  font-size:18px;color:rgba(255,255,255,0.6);margin-top:12px;
}

/* ===== SECTION LABEL ===== */
.section-label{
  font-size:10px;font-weight:600;letter-spacing:3px;
  color:rgba(255,255,255,0.35);text-transform:uppercase;
  margin-bottom:24px;
}

/* ===== MARKETS SECTION ===== */
#markets-section{display:none}
.markets-scroll{
  display:flex;gap:16px;overflow-x:auto;padding-bottom:12px;
  scrollbar-width:thin;
}
.market-card{
  min-width:220px;flex-shrink:0;
  background:var(--bg3);border:1px solid var(--border);border-radius:16px;
  padding:24px 20px;transition:border-color .3s;
}
.market-card:hover{border-color:rgba(255,255,255,0.2)}
.mc-header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.mc-flag{font-size:22px}
.mc-country{font-size:13px;font-weight:600;color:var(--text)}
.mc-city{font-size:10px;color:var(--text2);font-style:italic}
.mc-time{
  font-family:'Courier New',monospace;font-size:28px;font-weight:700;
  color:white;letter-spacing:1px;margin-bottom:4px;
}
.mc-tz{font-size:10px;color:rgba(255,255,255,0.35);margin-bottom:16px}
.mc-weather{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.mc-weather-icon{font-size:22px}
.mc-temp{font-size:20px;font-weight:600;color:var(--text)}
.mc-holiday{
  font-size:10px;color:var(--orange);padding-top:12px;
  border-top:1px solid var(--border);line-height:1.5;
}

/* ===== CALENDAR SECTION ===== */
#calendar-section{background:var(--bg);padding:60px 40px}
.calendar-layout{display:grid;grid-template-columns:1fr 280px;gap:32px;max-width:1400px;margin:0 auto}
.calendar-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.month-card{background:var(--bg4);border-radius:16px;padding:20px;border:1px solid var(--border)}
.month-title{
  font-size:13px;font-weight:600;color:var(--text);
  margin-bottom:14px;letter-spacing:.3px;
}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);gap:2px;
  margin-bottom:6px;
}
.cal-wd{
  text-align:center;font-size:9px;color:var(--text3);
  font-weight:500;padding:2px 0;
}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-day{
  position:relative;text-align:center;padding:5px 2px;
  font-size:11px;color:var(--text2);border-radius:6px;
  cursor:default;line-height:1;
}
.cal-day.empty{pointer-events:none}
.cal-day.today{
  background:var(--orange);color:black!important;
  font-weight:700;border-radius:50%;width:26px;height:26px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto;font-size:11px;
}
.cal-day.holiday{font-weight:700;cursor:pointer;position:relative;padding-left:4px}
.cal-day.holiday::before{
  content:'';position:absolute;left:0;top:2px;bottom:2px;
  width:3px;border-radius:2px;
}
.cal-day .holiday-dot{
  position:absolute;bottom:1px;left:50%;transform:translateX(-50%);
  width:4px;height:4px;border-radius:50%;
}
.cal-day.weekend{color:rgba(255,255,255,0.4)}
.cal-day:not(.empty):not(.today):hover{background:rgba(255,255,255,0.06)}

/* Tooltip */
.tooltip{
  display:none;position:absolute;z-index:200;bottom:calc(100% + 6px);left:50%;
  transform:translateX(-50%);
  background:#1E1E1E;border:1px solid rgba(255,255,255,0.1);border-radius:10px;
  padding:8px 12px;min-width:140px;max-width:200px;pointer-events:none;
  white-space:normal;word-break:break-word;
}
.tooltip-name{font-size:11px;font-weight:600;color:white;margin-bottom:4px}
.tooltip-date{font-size:10px;color:var(--text2)}
.tooltip-flags{font-size:10px;color:var(--text2);margin-top:3px}
.cal-day:hover .tooltip{display:block}

/* ===== UPCOMING PANEL ===== */
.upcoming-panel{
  background:var(--bg4);border:1px solid var(--border);border-radius:16px;
  padding:24px;height:fit-content;position:sticky;top:90px;
}
.upcoming-list{display:flex;flex-direction:column;gap:0}
.upcoming-item{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.upcoming-item:last-child{border-bottom:none}
.ui-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;
}
.ui-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:3px}
.ui-meta{font-size:10px;color:var(--text2)}
.ui-days{
  margin-left:auto;font-size:20px;font-weight:700;
  font-family:'Courier New',monospace;color:var(--orange);flex-shrink:0;
}
.ui-days-label{font-size:9px;color:var(--text3);text-align:right}

/* ===== CITY INFO CARD ===== */
#city-info-section{display:none;background:#0F0F0F;padding:60px 40px}
.city-card{
  max-width:900px;margin:0 auto;background:#1A1A1A;border-radius:20px;padding:40px;
  border:1px solid var(--border);
}
.city-card-inner{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;align-items:start}
.city-left{}
.city-flag-big{font-size:48px;display:block;margin-bottom:12px}
.city-country-name{font-family:var(--font-serif);font-size:36px;font-weight:900;color:white;line-height:1}
.city-city-name{font-family:var(--font-baskerville);font-style:italic;font-size:14px;color:var(--text2);margin-top:6px}
.city-mid{}
.city-time{
  font-family:'Courier New',monospace;font-size:52px;font-weight:700;
  color:white;letter-spacing:2px;line-height:1;
}
.city-tz{font-size:12px;color:rgba(255,255,255,0.4);margin-top:8px}
.city-right{}
.city-temp{font-size:40px;font-weight:700;color:var(--text);line-height:1}
.city-forecast{margin-top:12px;display:flex;flex-direction:column;gap:4px}
.forecast-row{font-size:11px;color:var(--text2);display:flex;gap:6px}
.city-card-footer{
  margin-top:28px;padding-top:20px;border-top:1px solid var(--border);
  font-size:12px;color:var(--orange);
}

/* ===== SCROLL TO TOP ===== */
#scroll-top{
  position:fixed;bottom:30px;right:30px;z-index:50;
  width:40px;height:40px;border-radius:50%;
  background:rgba(255,105,0,0.85);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:white;opacity:0;pointer-events:none;
  transition:opacity .3s;box-shadow:0 4px 20px rgba(255,105,0,0.4);
}
#scroll-top.visible{opacity:1;pointer-events:all}

/* ===== RTL ===== */
[dir="rtl"] .hero-country-content{padding:60px 80px 60px auto;text-align:right}
[dir="rtl"] .mc-header{flex-direction:row-reverse}
[dir="rtl"] .upcoming-item{flex-direction:row-reverse}
[dir="rtl"] .city-card-inner{direction:rtl}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .hero-cards{grid-template-columns:repeat(4,1fr);padding:0 20px;gap:8px;bottom:20px}
  .calendar-layout{grid-template-columns:1fr}
  .calendar-grid{grid-template-columns:repeat(2,1fr)}
  #site-header{padding:16px 20px}
  .hero-country-content{padding:40px 24px}
  .city-card-inner{grid-template-columns:1fr;gap:20px}
  .calendar-layout .upcoming-panel{position:static}
}
@media(max-width:600px){
  .hero-cards{grid-template-columns:repeat(2,1fr)}
  .calendar-grid{grid-template-columns:1fr}
  .markets-scroll{gap:12px}
  #markets-section,#calendar-section,#city-info-section{padding:40px 20px}
}

/* fade-in animation for view switches */
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>

<!-- HEADER -->
<header id="site-header" class="transparent">
  <div id="header-left">
    <button id="back-btn"><span class="back-arrow">←</span> <span id="back-label">All Markets</span></button>
  </div>
  <div id="header-right">
    <div class="lang-group" id="lang-group"></div>
    <select id="year-select">
      <option value="2026">2026</option>
      <option value="2027">2027</option>
    </select>
  </div>
</header>

<!-- ===== GLOBAL OVERVIEW ===== -->
<div id="view-global">

  <!-- Hero Global -->
  <section id="hero-global">
    <div id="hero-slides"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <h1 class="hero-title">Keeta Global Time</h1>
      <p class="hero-subtitle" id="hero-subtitle-text">Holidays · Weather · Timezone · 8 Markets</p>
    </div>
    <div class="hero-cards" id="hero-cards"></div>
  </section>

  <!-- Markets -->
  <section id="markets-section">
    <p class="section-label" id="markets-label">MARKETS</p>
    <div class="markets-scroll" id="markets-scroll"></div>
  </section>

  <!-- Calendar Global -->
  <section id="calendar-section">
    <div class="calendar-layout">
      <div>
        <p class="section-label" id="cal-label-global">CALENDAR 2026</p>
        <div class="calendar-grid" id="calendar-grid-global"></div>
      </div>
      <div>
        <p class="section-label" id="upcoming-label-global">UPCOMING</p>
        <div class="upcoming-panel" id="upcoming-panel-global">
          <div class="upcoming-list" id="upcoming-list-global"></div>
        </div>
      </div>
    </div>
  </section>

</div>

<!-- ===== COUNTRY PAGE ===== -->
<div id="view-country" style="display:none">

  <!-- Hero Country -->
  <section id="hero-country">
    <div class="hero-country-bg" id="country-hero-bg"></div>
    <div class="hero-country-overlay"></div>
    <div class="hero-country-content">
      <h1 class="hero-country-title" id="country-title"></h1>
      <p class="hero-country-subtitle" id="country-subtitle"></p>
    </div>
  </section>

  <!-- City Info -->
  <section id="city-info-section" style="display:block">
    <div class="city-card" id="city-card">
      <div class="city-card-inner">
        <div class="city-left">
          <span class="city-flag-big" id="city-flag"></span>
          <div class="city-country-name" id="city-country-name"></div>
          <div class="city-city-name" id="city-city-name"></div>
        </div>
        <div class="city-mid">
          <div class="city-time" id="city-time">--:--:--</div>
          <div class="city-tz" id="city-tz"></div>
        </div>
        <div class="city-right">
          <div class="city-temp" id="city-temp">--</div>
          <div class="city-forecast" id="city-forecast"></div>
        </div>
      </div>
      <div class="city-card-footer" id="city-next-holiday"></div>
    </div>
  </section>

  <!-- Calendar Country -->
  <section id="calendar-section-country" style="background:var(--bg);padding:60px 40px">
    <div class="calendar-layout">
      <div>
        <p class="section-label" id="cal-label-country">CALENDAR 2026</p>
        <div class="calendar-grid" id="calendar-grid-country"></div>
      </div>
      <div>
        <p class="section-label" id="upcoming-label-country">UPCOMING</p>
        <div class="upcoming-panel">
          <div class="upcoming-list" id="upcoming-list-country"></div>
        </div>
      </div>
    </div>
  </section>

</div>

<!-- Scroll Top -->
<button id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

// ============================================================
// WEATHER (Open-Meteo)
// ============================================================
const WC_MAP = (c) => {
  if(c===0) return '☀️';
  if(c<=2) return '⛅';
  if(c===3) return '☁️';
  if(c<=48) return '🌫️';
  if(c<=67) return '🌧️';
  if(c<=77) return '❄️';
  if(c<=82) return '🌦️';
  return '⛈️';
};

async function fetchWeather(code) {
  const info = CITY_INFO[code];
  if (!info) return;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${info.lat}&longitude=${info.lon}&current_weather=true&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=${encodeURIComponent(info.tz)}&forecast_days=4`;
    const res = await fetch(url);
    const data = await res.json();
    const cw = data.current_weather;
    const icon = WC_MAP(cw.weathercode);
    const temp = Math.round(cw.temperature);
    const forecast = [];
    for (let i = 1; i <= 3; i++) {
      forecast.push({
        day: data.daily.time[i],
        icon: WC_MAP(data.daily.weathercode[i]),
        hi: Math.round(data.daily.temperature_2m_max[i]),
        lo: Math.round(data.daily.temperature_2m_min[i]),
      });
    }
    WEATHER_MOCK[code] = { icon, temp, unit:'°C', forecast };
    // Update hero card
    const hcWeather = document.querySelector(`#hero-cards .country-card:nth-child(${COUNTRIES.findIndex(c=>c.code===code)+1}) .cc-weather`);
    if (hcWeather) hcWeather.textContent = `${icon} ${temp}°C`;
    // Update market card
    const mcIcon = document.querySelector(`#mc-time-${code}`)?.parentElement?.querySelector('.mc-weather-icon');
    const mcTemp = document.querySelector(`#mc-time-${code}`)?.parentElement?.querySelector('.mc-temp');
    if (mcIcon) mcIcon.textContent = icon;
    if (mcTemp) mcTemp.textContent = `${temp}°C`;
  } catch(e) { /* keep mock */ }
}

function loadAllWeather() {
  COUNTRIES.forEach(c => fetchWeather(c.code));
}

function t(key) {
  return (UI_TEXT[key] && (UI_TEXT[key][currentLang] || UI_TEXT[key]['en'])) || key;
}

function countryName(code) {
  const map = COUNTRY_NAMES[currentLang] || COUNTRY_NAMES['en'];
  return map[code] || code;
}

function monthName(idx) {
  const arr = MONTH_NAMES[currentLang] || MONTH_NAMES['en'];
  return arr[idx];
}

function weekdays() {
  return WEEKDAY_SHORT[currentLang] || WEEKDAY_SHORT['en'];
}

function getHolidayName(h) {
  if (!h || !h.name) return '';
  if (typeof h.name === 'string') return h.name;
  return h.name[currentLang] || h.name['zh-TW'] || h.name['en'] || h.name['zh'] || '';
}

function parseDate(str) {
  // str: "2026-01-01"
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function formatDateKey(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function daysUntil(dateStr) {
  const today = new Date();
  const target = parseDate(dateStr);
  today.setHours(0,0,0,0);
  target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function getCountryColor(code) {
  const c = COUNTRIES.find(x => x.code === code);
  return c ? c.color : '#FF6900';
}

function getCountryFlag(code) {
  const c = COUNTRIES.find(x => x.code === code);
  return c ? c.flag : '';
}

// Build holiday lookup map from HOLIDAYS_DATA
// HOLIDAYS_DATA structure: { CN: { 2026: [{date, name}], 2027: [...] }, BR: {...}, ... }
function buildHolidayMap(year, filterCode) {
  // Returns: { "2026-01-01": [ {name, code, color} ] }
  const map = {};
  if (typeof HOLIDAYS_DATA === 'undefined') return map;
  const codes = filterCode ? [filterCode] : COUNTRIES.map(c => c.code);
  codes.forEach(code => {
    const countryData = HOLIDAYS_DATA[code];
    if (!countryData) return;
    const list = countryData[year] || countryData[String(year)] || [];
    list.forEach(h => {
      const key = h.date;
      if (!map[key]) map[key] = [];
      map[key].push({ name: h.name, code, color: getCountryColor(code) });
    });
  });
  return map;
}

function getUpcomingHolidays(year, filterCode, limit) {
  if (typeof HOLIDAYS_DATA === 'undefined') return [];
  const codes = filterCode ? [filterCode] : COUNTRIES.map(c => c.code);
  const today = new Date(); today.setHours(0,0,0,0);
  const all = [];
  codes.forEach(code => {
    const countryData = HOLIDAYS_DATA[code];
    if (!countryData) return;
    const list = countryData[year] || countryData[String(year)] || [];
    list.forEach(h => {
      const d = parseDate(h.date); d.setHours(0,0,0,0);
      if (d >= today) all.push({ ...h, code, color: getCountryColor(code) });
    });
  });
  all.sort((a,b) => a.date.localeCompare(b.date));
  return all.slice(0, limit || 10);
}

function getNextHoliday(code) {
  const upcoming = getUpcomingHolidays(currentYear, code, 1);
  return upcoming[0] || null;
}

function getTimeInZone(tz) {
  try {
    const now = new Date();
    const s = now.toLocaleString('en-US', {timeZone: tz, hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false});
    return s;
  } catch(e) { return '--:--:--'; }
}

function buildCalendar(mode, filterCode) {
  // mode = 'global' | 'country'
  const gridId = mode === 'global' ? 'calendar-grid-global' : 'calendar-grid-country';
  const grid = document.getElementById(gridId);
  if (!grid) return;
  grid.innerHTML = '';

  const today = new Date();
  const holidayMap = buildHolidayMap(currentYear, filterCode || null);

  for (let m = 0; m < 12; m++) {
    const card = buildMonthCard(currentYear, m, today, holidayMap, filterCode);
    grid.appendChild(card);
  }
}

function buildMonthCard(year, month, today, holidayMap, filterCode) {
  const card = document.createElement('div');
  card.className = 'month-card';

  const title = document.createElement('div');
  title.className = 'month-title';
  title.textContent = monthName(month) + ' ' + year;
  card.appendChild(title);

  // Weekday headers
  const wdRow = document.createElement('div');
  wdRow.className = 'cal-weekdays';
  weekdays().forEach(wd => {
    const d = document.createElement('div');
    d.className = 'cal-wd';
    d.textContent = wd;
    wdRow.appendChild(d);
  });
  card.appendChild(wdRow);

  // Days
  const daysGrid = document.createElement('div');
  daysGrid.className = 'cal-days';

  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) {
    const empty = document.createElement('div');
    empty.className = 'cal-day empty';
    daysGrid.appendChild(empty);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dayEl = document.createElement('div');
    const key = formatDateKey(year, month, d);
    const dow = new Date(year, month, d).getDay();
    const isToday = (year === today.getFullYear() && month === today.getMonth() && d === today.getDate());
    const holidays = holidayMap[key] || [];
    const isWeekend = (dow === 0 || dow === 6);

    let classes = 'cal-day';
    if (isToday) classes += ' today';
    else if (isWeekend) classes += ' weekend';
    if (holidays.length > 0 && !isToday) classes += ' holiday';

    dayEl.className = classes;

    if (isToday) {
      dayEl.textContent = d;
    } else if (holidays.length > 0) {
      // Determine dominant color
      let color = holidays[0].color || getCountryColor(holidays[0].code);
      if (filterCode) color = getCountryColor(filterCode);

      dayEl.style.color = color;
      dayEl.innerHTML = `<span>${d}</span>`;
      dayEl.style.setProperty('--hol-color', color);
      dayEl.querySelector('span').style.position = 'relative';

      // Left border via before
      dayEl.style.cssText += `position:relative;`;

      // Add dot
      const dot = document.createElement('span');
      dot.className = 'holiday-dot';
      dot.style.background = color;
      dayEl.appendChild(dot);

      // Left line
      dayEl.style.borderLeft = `3px solid ${color}`;
      dayEl.style.paddingLeft = '4px';
      dayEl.style.borderRadius = '0 6px 6px 0';

      // Tooltip
      const tt = document.createElement('div');
      tt.className = 'tooltip';
      const names = holidays.map(h => getHolidayName(h)).filter(Boolean).join(' / ');
      const flags = holidays.map(h => getCountryFlag(h.code)).join(' ');
      tt.innerHTML = `<div class="tooltip-name">${names}</div><div class="tooltip-date">${key}</div><div class="tooltip-flags">${flags}</div>`;
      dayEl.appendChild(tt);
    } else {
      dayEl.textContent = d;
    }

    daysGrid.appendChild(dayEl);
  }

  card.appendChild(daysGrid);
  return card;
}

// ============================================================
// UPCOMING
// ============================================================
function buildUpcoming(mode, filterCode) {
  const listId = mode === 'global' ? 'upcoming-list-global' : 'upcoming-list-country';
  const list = document.getElementById(listId);
  if (!list) return;
  list.innerHTML = '';

  const upcoming = getUpcomingHolidays(currentYear, filterCode || null, 12);

  if (!upcoming.length) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:16px 0">—</div>';
    return;
  }

  upcoming.forEach(h => {
    const du = daysUntil(h.date);
    if (du < 0) return;
    const color = filterCode ? getCountryColor(filterCode) : (h.color || getCountryColor(h.code));
    const flags = getCountryFlag(h.code);

    const item = document.createElement('div');
    item.className = 'upcoming-item';
    item.innerHTML = `
      <div class="ui-dot" style="background:${color}"></div>
      <div style="flex:1;min-width:0">
        <div class="ui-name">${getHolidayName(h)}</div>
        <div class="ui-meta">${h.date} · ${flags}</div>
      </div>
      <div>
        <div class="ui-days">${du}</div>
        <div class="ui-days-label">${t('days')}</div>
      </div>
    `;
    list.appendChild(item);
  });
}

function renderCountryPage(code) {

  const c = COUNTRIES.find(x => x.code === code);

  const enName = COUNTRY_NAMES['en'][code] || code;
  document.getElementById('country-title').textContent = enName;
  document.getElementById('country-subtitle').textContent = info.city;

  document.getElementById('city-flag').textContent = c.flag;
  document.getElementById('city-country-name').textContent = countryName(code);
  document.getElementById('city-city-name').textContent = info.city;
  document.getElementById('city-time').textContent = getTimeInZone(info.tz);
  document.getElementById('city-tz').textContent = info.tzLabel;
  document.getElementById('city-temp').textContent = w.icon + ' ' + w.temp + w.unit;

  // Forecast
  const fcEl = document.getElementById('city-forecast');
  fcEl.innerHTML = '';
  (w.forecast || []).forEach(f => {
    const row = document.createElement('div');
    row.className = 'forecast-row';
    row.innerHTML = `<span>${f.day}</span><span>${f.icon}</span><span>${f.hi}° / ${f.lo}°</span>`;
    fcEl.appendChild(row);
  });

  // Next holiday
  const nextHol = getNextHoliday(code);
  const footerEl = document.getElementById('city-next-holiday');
  if (nextHol) {
    footerEl.textContent = t('nextHol') + getHolidayName(nextHol) + ' · ' + nextHol.date;
  } else {
    footerEl.textContent = '';
  }

  // Calendar & Upcoming
  buildCalendar('country', code);
  buildUpcoming('country', code);

  // Labels
  document.getElementById('cal-label-country').textContent = t('calendar') + ' ' + currentYear;
  document.getElementById('upcoming-label-country').textContent = t('upcoming');
}

// ============================================================
// SCROLL
// ============================================================
function handleScroll() {
  const header = document.getElementById('site-header');
  const scrollBtn = document.getElementById('scroll-top');
  const y = window.scrollY;

  if (y > 80) {
    header.classList.remove('transparent');
    header.classList.add('solid');
  } else {
    header.classList.remove('solid');
    header.classList.add('transparent');
  }

  if (y > 400) scrollBtn.classList.add('visible');
  else scrollBtn.classList.remove('visible');
}

</script>
</body>
</html>
